name: Release

# Stable tags trigger .github/workflows/release-announcement.yml,
# which posts a GitHub Discussion in the Announcements category
# after this workflow publishes. Pre-releases are skipped there.
# See #51.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0). Must not exist yet; workflow creates it."
        required: true
        type: string
      dry_run:
        description: "Dry run — build and validate without publishing or tagging."
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Workflow-level least-privilege baseline. Every job below declares
# its own `permissions:` block so this baseline applies only as a
# safety net for any future job added without an explicit override.
permissions:
  contents: read

jobs:
  verify:
    name: Verify quality gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Disallow non-dry release from a non-main ref
        if: github.ref != 'refs/heads/main' && inputs.dry_run != true
        run: |
          echo "::error::Non-dry releases must dispatch from main (got ${{ github.ref }}). Merge to main first, then re-dispatch."
          exit 1
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true
      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@v0.28.0
      - name: Install golangci-lint
        # Install directly so 'make check' can invoke it — the action
        # tries to 'run' the linter itself which would run lint twice.
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: Run quality gate
        run: make check
      - name: Enforce 90% coverage threshold
        run: |
          set -euo pipefail
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          awk -v v="$total" 'BEGIN { exit !(v+0 >= 90) }' || {
            echo "::error::Coverage ${total}% is below the 90% release threshold."
            exit 1
          }
          echo "Coverage ${total}% meets the 90% release threshold."

  tag:
    name: Create tag
    needs: verify
    if: inputs.dry_run != true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Validate tag format
        run: |
          if [[ ! "${{ inputs.tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Tag must match vMAJOR.MINOR.PATCH[-prerelease]"
            exit 1
          fi
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.tag }}" -m "Release ${{ inputs.tag }}"
          git push origin "${{ inputs.tag }}"

  goreleaser:
    name: GoReleaser
    needs: [verify, tag]
    if: always() && needs.verify.result == 'success' && (needs.tag.result == 'success' || needs.tag.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      # `contents: write` — GoReleaser publishes the GitHub release.
      # `id-token: write` and `attestations: write` — the
      # `actions/attest-build-provenance` step below signs each
      # GoReleaser artefact with a Sigstore short-lived cert minted
      # against the workflow's OIDC token and uploads the resulting
      # attestation to the repository's `/attestations` namespace.
      # See SECURITY.md "Verifying a release" for the consumer
      # verification path.
      contents: write
      id-token: write
      attestations: write
    steps:
      # On a real release the tag has just been pushed by the `tag`
      # job, so we check it out. On a dry run no tag exists yet;
      # fall back to the workflow's invocation ref so the build runs
      # against the commit a human operator just validated.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.dry_run && github.ref || inputs.tag }}
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true
      - name: Dry-run GoReleaser
        if: inputs.dry_run == true
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: v2.7.0
          args: release --snapshot --clean
      - name: Publish GoReleaser
        if: inputs.dry_run != true
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: v2.7.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Attach SLSA/Sigstore build-provenance attestations to every
      # artefact GoReleaser emitted into dist/. Today that is just
      # `metadata.json`; the glob generalises to whatever future
      # release artefacts the GoReleaser config produces. Consumers
      # verify with `gh attestation verify <artefact> --owner
      # axonops` — see SECURITY.md "Verifying a release".
      #
      # `continue-on-error: true` is deliberate: a transient
      # Sigstore/Fulcio outage must not block a tag from going out.
      # The attestation can be regenerated later if needed; a
      # blocked release cannot.
      - name: Attach build-provenance attestations
        if: inputs.dry_run != true
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        continue-on-error: true
        with:
          subject-path: dist/**/*

  proxy-warm:
    name: Warm Go module proxy
    needs: goreleaser
    if: inputs.dry_run != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Request module from proxy (with retry)
        run: |
          tag="${{ inputs.tag }}"
          for attempt in 1 2 3 4 5 6; do
            if curl -sSfL "https://proxy.golang.org/github.com/axonops/mask/@v/${tag}.info" | tee /dev/stderr; then
              exit 0
            fi
            echo "proxy not ready, retry ${attempt}/6 in 15s"
            sleep 15
          done
          echo "proxy did not index ${tag} after 90s"
          exit 1
