version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gocyclo
    - gocritic
    - revive
    - unconvert
    - unparam
    - bodyclose
    - goconst
    - prealloc
    - nolintlint
    - copyloopvar
  settings:
    gocyclo:
      min-complexity: 10
    misspell:
      locale: UK
      # "Harbor" is a proper noun — "HIPAA Safe Harbor" is the official
      # name of the US HIPAA regulation, not a British/American spelling
      # variant. Ignoring it lets the UK locale apply everywhere else.
      ignore-rules:
        - Harbor
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: var-naming
        - name: package-comments
        - name: if-return
        - name: error-return
        - name: error-naming
        - name: error-strings
        - name: errorf
        - name: unused-parameter
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - gocritic
          - unparam
          - goconst
      - path: tests/bdd/
        linters:
          - gocyclo
          - gocritic
      # SHA3_256 / SHA3_512 mirror the names in stdlib crypto
      # (crypto.SHA3_256, crypto.SHA3_512) so callers switching
      # between packages see identical spellings. Revive's ALL_CAPS
      # rule is correct in general but is noise for this specific
      # stdlib-conformance case.
      - path: hash\.go
        text: "var-naming: don't use ALL_CAPS"
        linters:
          - revive

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/axonops/mask

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
